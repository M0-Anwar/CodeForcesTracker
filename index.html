<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeforces Tracker</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0b1220;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 32px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            padding: 30px 40px;
            border-radius: 12px;
            text-align: center;
            width: 260px;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #2563eb;
        }

        .card h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .card p {
            font-size: 14px;
            color: #cbd5f5;
        }

        @media (max-width: 600px) {
            .card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <h1>📊 Codeforces Tracker</h1>

    <div class="container">

        <a class="card" href="trackByProblemSet/problemSetTracker.html">
            <h2>📚 Track by Problem Set</h2>
            <p>Track solving progress across selected problems</p>
        </a>

        <a class="card" href="trackByUser/home.html">
            <h2>👥 Track by User</h2>
            <p>Analyze users and their solved problems</p>
        </a>

    </div>

</body>
</html>
