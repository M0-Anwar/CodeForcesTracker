<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CF Mobile Calendar</title>

<style>


.header {
  background: var(--header);
  color: white;
  padding: 12px;

  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.nav {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  /* background: white; */
  background: var(--nav);
  position: sticky;
  top: 0;
}

.nav button {
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  background: #3b82f6;
  color: white;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  padding: 10px;
}

.day-name {
  text-align: center;
  font-weight: bold;
  font-size: 12px;
}

.day {
  padding: 10px 0;
  text-align: center;
  border-radius: 8px;
  font-size: 14px;
  /* background: white;
  border: 1px solid #ddd; */
  background: var(--card);
  border: 1px solid var(--border);
}

.selected {
  outline: 2px solid black;
}

/* Colors */
.c1 { background: #ffeb3b; }
.c2 { background: #ff9800; color: white; }
.c3 { background: #4caf50; color: white; }
.c4 { background: #81d4fa; }
.c5 { background: #2196f3; color: white; }
/* Dark Mode Adjustments */
body.dark .c1 { background: #a16207; }
body.dark .c2 { background: #c2410c; }
body.dark .c3 { background: #166534; }
body.dark .c4 { background: #075985; }
body.dark .c5 { background: #1d4ed8; }

:root {
  --bg: #f2f3f7;
  --card: white;
  --text: black;
  --nav: white;
  --header: #1f2937;
  --border: #ddd;
}

body.dark {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e5e7eb;
  --nav: #1e293b;
  --header: #0b1220;
  --border: #334155;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

.section {
  /* background: white; */
  background: var(--card); 
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

.section h3 {
  margin-top: 0;
}

.stats {
  font-size: 14px;
  line-height: 1.6;
}

table {
  width: 100%;
  font-size: 13px;
}

td {
  padding: 6px;
  border-bottom: 1px solid #eee;
}

a {
  text-decoration: none;
  color: #2563eb;
}

.future {
  background: var(--border);
  opacity: 0.5;
  cursor: not-allowed;
}

.future:hover {
  transform: scale(1.05);
  transition: 0.15s;
}
.theme-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

  <div class="header">
    <div>
      <h2>Codeforces Activity</h2>
      <div id="username"></div>
    </div>

    <button onclick="toggleDark()" class="theme-btn">
      Dark/Light Mode
    </button>
  </div>

<div class="nav">
  <button onclick="changeMonth(-1)">◀</button>
  <div id="monthTitle"></div>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<div class="section stats" id="stats"></div>

<div class="section">
  <h3>✅ Solved</h3>
  <div id="solved"></div>
</div>

<div class="section">
  <h3>❌ Upsolved</h3>
  <div id="upsolved"></div>
</div>

<div class="section">
  <h3>🧠 Topics</h3>
  <div id="topics"></div>
</div>

<script src="script.js"></script>
</body>
</html>
