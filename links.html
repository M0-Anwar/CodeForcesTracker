<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Codeforces Problems Table</title>
  <style>
    body {
      background: #1e1e1e;
      color: #ddd;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 30px;
    }

    .table-container {
      max-width: 1200px;
      margin: auto;
      overflow-x: auto;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      background: #232323;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: #3a3a3a;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #3a3a3a;
      text-align: left;
      vertical-align: top;
    }

    tbody tr:nth-child(even) {
      background: #252525;
    }

    tbody tr:hover {
      background: #2d2d2d;
    }

    a {
      color: #4fc3f7;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: #353535;
      color: #cfcfcf;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .status {
      max-width: 1200px;
      margin: 0 auto 16px;
      color: #bbb;
    }

    .error {
      color: #ff8a8a;
    }
  </style>
</head>

<body>
  <div class="status" id="status">Loading problems...</div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Origin</th>
          <th>Title</th>
          <th>Rating</th>
          <th>Tags</th>
        </tr>
      </thead>
      <tbody id="problems-body"></tbody>
    </table>
  </div>

  <script>
    const problemsInput = [
      {id : "792C"},
      {id : "313D"},
      {id : "988F"},
      {id : "999F"},
      {id : "1066F"},
      {id : "1154F"},
      {id : "984D"},
      {id : "1625C"},
    ];

    const tableBody = document.getElementById("problems-body");

    function isCodeforces(problem) {
      return !problem.platform; // no platform = CF
    }

    function buildCFKey(problem) {
      return problem.id.toUpperCase();
    }

    async function loadProblems() {
      const response = await fetch("https://codeforces.com/api/problemset.problems");
      const data = await response.json();

      const allProblems = data.result.problems;
      const map = new Map();

      // build CF map
      for (const p of allProblems) {
        map.set((p.contestId + p.index).toUpperCase(), p);
      }

      let rows = "";

      problemsInput.forEach((item, idx) => {
        // ✅ CASE 1: Codeforces
        if (isCodeforces(item)) {
          const p = map.get(buildCFKey(item));

          if (!p) {
            rows += `<tr><td>${idx + 1}</td><td>${item.id}</td><td colspan="3">Not found</td></tr>`;
            return;
          }

          const url = `https://codeforces.com/problemset/problem/${p.contestId}/${p.index}`;

          rows += `
        <tr>
          <td>${idx + 1}</td>
          <td><a href="${url}" target="_blank">CodeForces ${p.contestId}${p.index}</a></td>
          <td>${p.name}</td>
          <td>${p.rating ?? "-"}</td>
          <td>${p.tags.map(t => `<span class="tag">${t}</span>`).join("")}</td>
        </tr>
      `;
        }

        // ✅ CASE 2: Non-Codeforces
        else {
          rows += `
        <tr>
          <td>${idx + 1}</td>
          <td><a href="${item.link}" target="_blank">${item.platform} ${item.id}</a></td>
          <td>${item.title}</td>
          <td>${item.rating}</td>
          <td>${item.tags.map(t => `<span class="tag">${t}</span>`).join("")}</td>
        </tr>
      `;
        }
      });

      tableBody.innerHTML = rows;
    }

    loadProblems();
  </script>
</body>

</html>
